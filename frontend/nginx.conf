server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the backend container.
    # The trailing slash on proxy_pass strips /api from the forwarded path,
    # so /api/solicitations -> http://backend:8000/solicitations
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;  # scrape + generation jobs can run > 60s
        proxy_send_timeout 300s;
    }

    # SPA fallback: all unmatched paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
