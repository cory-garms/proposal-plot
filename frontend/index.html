<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProposalPilot</title>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= query param from 404.html
        var p = window.location.search.slice(1).split('&').find(function(s) { return s.startsWith('p='); });
        if (p) {
          var basePath = window.location.pathname.replace(/\/$/, '');
          var path = basePath + '/' + p.slice(2).replace(/~and~/g, '&');
          var qs = window.location.search.slice(1).split('&').filter(function(s) { return !s.startsWith('p=') && !s.startsWith('q='); });
          var q = window.location.search.slice(1).split('&').find(function(s) { return s.startsWith('q='); });
          history.replaceState(null, null, path + (qs.length ? '?' + qs.join('&') : '') + (q ? '?' + q.slice(2).replace(/~and~/g, '&') : '') + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
